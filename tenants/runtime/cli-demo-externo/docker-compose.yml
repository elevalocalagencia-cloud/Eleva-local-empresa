name: cli-demo-externo-n8n

services:
  n8n:
    image: ${N8N_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgresql
      - cli-demo-externo-redis
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgresql
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_MODE: queue
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PORT: "5678"
      N8N_PROTOCOL: https
      N8N_PROXY_HOPS: "1"
      N8N_SECURE_COOKIE: "true"
      N8N_UI_BANNER: ${N8N_UI_BANNER}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      QUEUE_BULL_REDIS_HOST: cli-demo-externo-redis
      QUEUE_BULL_REDIS_PORT: "6379"
      WEBHOOK_URL: https://${N8N_DOMAIN}
    volumes:
      - n8n-data:/home/node/.n8n
      - ./seed-workflows:/seed-workflows:ro
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.n8n-demo-http.rule=Host(`wf-demo.elevalocal.shop`)
      - traefik.http.routers.n8n-demo-http.entrypoints=http
      - traefik.http.routers.n8n-demo-http.middlewares=redirect-to-https
      - traefik.http.routers.n8n-demo.rule=Host(`wf-demo.elevalocal.shop`)
      - traefik.http.routers.n8n-demo.entrypoints=https
      - traefik.http.routers.n8n-demo.tls=true
      - traefik.http.routers.n8n-demo.tls.certresolver=letsencrypt
      - traefik.http.routers.n8n-demo.middlewares=n8n-demo-headers,n8n-demo-ratelimit
      - traefik.http.routers.n8n-demo.service=n8n-demo
      - traefik.http.services.n8n-demo.loadbalancer.server.port=5678
      - traefik.http.middlewares.n8n-demo-headers.headers.customresponseheaders.X-Eleva-Local-Demo=AMBIENTE DEMO - DADOS NAO PRESERVADOS
      - traefik.http.middlewares.n8n-demo-headers.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow
      - traefik.http.middlewares.n8n-demo-ratelimit.ratelimit.average=100
      - traefik.http.middlewares.n8n-demo-ratelimit.ratelimit.burst=50
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https

  n8n-worker:
    image: ${N8N_IMAGE}
    restart: unless-stopped
    depends_on:
      - postgresql
      - cli-demo-externo-redis
    command: worker
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgresql
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB}
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      EXECUTIONS_MODE: queue
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_USER_MANAGEMENT_JWT_SECRET}
      QUEUE_BULL_REDIS_HOST: cli-demo-externo-redis
      QUEUE_BULL_REDIS_PORT: "6379"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - internal

  postgresql:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
    networks:
      - internal

  cli-demo-externo-redis:
    image: ${REDIS_IMAGE}
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal

volumes:
  n8n-data:
    name: cli-demo-externo-n8n-data
  postgresql-data:
    name: cli-demo-externo-postgresql-data
  redis-data:
    name: cli-demo-externo-redis-data

networks:
  internal:
    name: cli-demo-externo-net
    driver: bridge
  traefik:
    external: true
    name: coolify
